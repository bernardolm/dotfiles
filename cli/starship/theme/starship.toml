format = '[[ $symbol( $version)( venv:$virtualenv) ](fg:color_fg0 bg:color_blue)]($style)'

[docker_context]
symbol = "’īł"
style = "bg:color_bg3"
format = '[[ $symbol( $context) ](fg:#83a598 bg:color_bg3)]($style)'

# [conda]
# disabled = true
# style = "bg:color_bg3"
