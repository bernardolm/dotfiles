# error_symbol = "­¤ż¼  "

[custom.wsl]
symbol = '­¤¬¤ '
when='[[ $(grep -i Microsoft /proc/version) ]]'

[os]
disabled=false
format = "[on (${custom.wsl} $symbol $name $codename )]($style)"
# style = "bold blue"
style = "bg:color_orange fg:color_fg0"

[hostname]
format = 'at [$ssh_symbol$hostname]($style) '
ssh_only = false
ssh_symbol = '­¤ōĪ '
style = 'bold red'

