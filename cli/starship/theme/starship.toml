[custom.history_lines]
# Value from $HOME/dotfiles/cli/starship/functions/starship_history_lines (uses $HISTFILE). Output: "lines / sizeKB".
# Style uses Pantone light blue palette (color_history_*).
# Nerd Font symbol: nf-md-bash (U+F1183)
command = "$HOME/dotfiles/cli/starship/functions/starship_history_lines"
when = true
symbol = "¾▒åā "
style = "fg:color_history_fg bg:color_history_bg"
format = "[ $symbol$output ]($style)"

[time]
disabled = true
time_format = "%R"
style = "bg:color_bg1"
format = '[[ ’É║ $time ](fg:color_fg0 bg:color_bg1)]($style)'

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[’É▓](bold fg:color_green)'
error_symbol = '[’É▓](bold fg:color_red)'
vimcmd_symbol = '[’É┤](bold fg:color_green)'
vimcmd_replace_one_symbol = '[’É┤](bold fg:color_purple)'
vimcmd_replace_symbol = '[’É┤](bold fg:color_purple)'
vimcmd_visual_symbol = '[’É┤](bold fg:color_yellow)'

#---------------------------------------------------------------------------------------

